<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank you — Forget Me Not</title>
  <link rel="icon" href="favicon.png" type="image/png" sizes="64x64">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --purple-deep: #7b6fb0; --purple-pale: #ece9f8; --text: #2d2640; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "DM Sans", sans-serif;
      background: var(--purple-pale);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 36px;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(123, 111, 176, 0.2);
    }
    h1 {
      font-family: "Playfair Display", serif;
      font-size: 1.75rem;
      font-style: italic;
      margin-bottom: 12px;
    }
    p { color: #7a7390; font-size: 0.95rem; line-height: 1.5; margin-bottom: 24px; }
    a {
      display: inline-block;
      background: var(--purple-deep);
      color: #fff;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    a:hover { opacity: 0.92; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank you</h1>
    <p>Your payment went through. You will receive a confirmation from Stripe by email.</p>
    <a href="/">Back to shop</a>
  </div>
</body>
</html>
